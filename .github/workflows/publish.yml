name: Publish to npm + Docker Hub

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm publish --access public
        env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }

  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Push Docker
        run: |
          docker build -t caludelaw/taichu:latest -t caludelaw/taichu:${{ github.ref_name }} .
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u caludelaw --password-stdin
          docker push caludelaw/taichu:latest
          docker push caludelaw/taichu:${{ github.ref_name }}

  docker-aliyun:
    runs-on: ubuntu-latest
    needs: docker-publish
    steps:
      - name: Mirror to Alibaba Cloud ACR (China)
        run: |
          docker pull caludelaw/taichu:latest
          docker tag caludelaw/taichu:latest registry.cn-hangzhou.aliyuncs.com/caludelaw/taichu:latest
          echo "${{ secrets.ALIYUN_ACR_TOKEN }}" | docker login --username=${{ secrets.ALIYUN_ACR_USER }} --password-stdin registry.cn-hangzhou.aliyuncs.com
          docker push registry.cn-hangzhou.aliyuncs.com/caludelaw/taichu:latest
