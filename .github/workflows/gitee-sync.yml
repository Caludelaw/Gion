name: Sync to Gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://Caludelaw:${{ secrets.GITEE_TOKEN }}@gitee.com/Caludelaw/Taichu.git
          git push gitee main --force --tags
